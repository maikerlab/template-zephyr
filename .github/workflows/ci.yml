name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  set-image-tag:
    runs-on: ubuntu-24.04
    outputs:
      IMAGE_TAG: ${{ steps.set-output.outputs.IMAGE_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: app

      - name: Install west
        run: pip3 install west

      - name: Initialize west workspace
        run: |
          west init -l app
          west update -o=--depth=1 -n nrf

      - name: Resolve toolchain image tag
        id: set-output
        run: echo "IMAGE_TAG=$(./nrf/scripts/print_toolchain_checksum.sh)" >> $GITHUB_OUTPUT

  build:
    needs: set-image-tag
    runs-on: ubuntu-24.04
    container: ghcr.io/nrfconnect/sdk-nrf-toolchain:${{ needs.set-image-tag.outputs.IMAGE_TAG }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: app

      - name: Cache west workspace
        uses: actions/cache@v4
        with:
          path: |
            bootloader
            modules
            nrf
            nrfxlib
            zephyr
            tools
          key: west-ws-${{ runner.os }}-${{ hashFiles('app/west.yml') }}

      - name: Initialize and update west workspace
        run: |
          west init -l app
          west update -o=--depth=1 -n

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-build-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            ccache-build-${{ runner.os }}-${{ github.ref }}-
            ccache-build-${{ runner.os }}-

      - name: Enable ccache
        run: |
          ccache --version || (apt-get update && apt-get install -y ccache)
          echo "CCACHE_DIR=$HOME/.cache/ccache" >> $GITHUB_ENV
          echo "/usr/lib/ccache" >> $GITHUB_PATH

      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: app/build
          key: build-${{ runner.os }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            build-${{ runner.os }}-${{ github.ref }}-
            build-${{ runner.os }}-

      - name: Build firmware
        working-directory: app
        run: west build -b nrf7002dk/nrf5340/cpuapp -p auto

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            app/build/zephyr/zephyr.hex
            app/build/zephyr/zephyr.bin

  test:
    needs: set-image-tag
    runs-on: ubuntu-24.04
    container: ghcr.io/nrfconnect/sdk-nrf-toolchain:${{ needs.set-image-tag.outputs.IMAGE_TAG }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: app

      - name: Cache west workspace
        uses: actions/cache@v4
        with:
          path: |
            bootloader
            modules
            nrf
            nrfxlib
            zephyr
            tools
          key: west-ws-${{ runner.os }}-${{ hashFiles('app/west.yml') }}

      - name: Install host toolchain for native_sim
        run: |
          apt-get -y update
          apt-get -y install gcc-multilib g++-multilib make

      - name: Initialize and update west workspace
        run: |
          west init -l app
          west update -o=--depth=1 -n

      - name: Run unit tests on native_sim
        working-directory: app
        run: west twister -T tests/unit -p native_sim -v --inline-logs

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/twister-out/

  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get -y update
          sudo apt-get -y install clang-format

      - name: Check code formatting
        run: |
          find src include tests -name '*.c' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror
